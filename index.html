<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <title>Bookmark Desktop</title>
    <link rel="stylesheet" href="css/iconfont.css">
    <link rel="stylesheet" href="css/bm.css">
    <style>
        /* ===== Reset & Base ===== */
        :root {
            --menu-height: 44px;
            --menu-bg: rgba(255,255,255,.25);
            --menu-blur: 20px;
            --menu-text: #fff;
            --dock-height: 70px;
            --dock-bg: rgba(255,255,255,.15);
            --desktop-icon-size: 72px;
            --desktop-icon-gap: 20px;
            --accent: #007AFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            background: #1a1a2e;
            -webkit-user-select: none; user-select: none;
        }
        body.light-mode {
            --menu-bg: rgba(255,255,255,.7);
            --menu-text: #222;
            --dock-bg: rgba(255,255,255,.4);
        }

        /* ===== Wallpaper ===== */
        .wallpaper-layer {
            position: fixed; inset: 0; z-index: 0;
        }
        .wallpaper-layer img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .wallpaper-layer .blur-overlay {
            position: absolute; inset: 0;
            backdrop-filter: blur(var(--wp-blur, 0px));
            -webkit-backdrop-filter: blur(var(--wp-blur, 0px));
            background: rgba(0,0,0,var(--wp-brightness, 0));
        }

        /* ===== Top Menu Bar (macOS style) ===== */
        .top-menu {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            height: var(--menu-height);
            background: var(--menu-bg);
            backdrop-filter: blur(var(--menu-blur));
            -webkit-backdrop-filter: blur(var(--menu-blur));
            display: flex; align-items: center;
            padding: 0 16px;
            color: var(--menu-text);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }
        .top-menu .menu-left { display: flex; align-items: center; gap: 18px; min-width: 180px; }
        .top-menu .menu-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .top-menu .menu-right { display: flex; align-items: center; gap: 14px; min-width: 180px; justify-content: flex-end; }

        .menu-left .app-name {
            font-weight: 600; font-size: 14px; cursor: pointer;
            padding: 4px 8px; border-radius: 4px;
        }
        .menu-left .app-name:hover { background: rgba(255,255,255,.15); }
        .menu-left .menu-item {
            cursor: pointer; padding: 4px 8px; border-radius: 4px;
            position: relative;
        }
        .menu-left .menu-item:hover { background: rgba(255,255,255,.15); }

        .menu-center .folder-chip {
            padding: 3px 12px; border-radius: 12px; cursor: pointer;
            font-size: 12px; background: rgba(255,255,255,.1);
            transition: all .2s; white-space: nowrap;
        }
        .menu-center .folder-chip:hover { background: rgba(255,255,255,.2); }
        .menu-center .folder-chip.active { background: rgba(255,255,255,.25); font-weight: 600; }
        .menu-center .folder-chip-sep { color: rgba(255,255,255,.3); font-size: 10px; }

        .menu-right .menu-icon-btn {
            width: 28px; height: 28px; border-radius: 50%;
            border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            background: rgba(255,255,255,.1);
            color: var(--menu-text); font-size: 14px;
            transition: all .2s;
        }
        .menu-right .menu-icon-btn:hover { background: rgba(255,255,255,.2); }
        .menu-right .clock-display { font-size: 12px; opacity: .9; letter-spacing: .5px; font-variant-numeric: tabular-nums; }
        .menu-right .search-box {
            display: flex; align-items: center; background: rgba(255,255,255,.15);
            border-radius: 16px; padding: 2px 10px; gap: 4px;
        }
        .menu-right .search-box input {
            background: none; border: none; outline: none;
            color: var(--menu-text); font-size: 12px; width: 100px;
        }
        .menu-right .search-box input::placeholder { color: rgba(255,255,255,.5); }

        /* ===== Desktop Icons Area ===== */
        .desktop-area {
            position: fixed; top: var(--menu-height); left: 0; right: 0; bottom: calc(var(--dock-height) + 10px);
            z-index: 1; overflow-y: auto; padding: 30px 40px;
        }
        .desktop-area::-webkit-scrollbar { width: 4px; }
        .desktop-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }

        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, var(--desktop-icon-size));
            gap: var(--desktop-icon-gap);
            justify-content: center;
            padding: 20px 0;
        }
        .desktop-icon {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; padding: 8px; border-radius: 8px;
            transition: all .2s; width: var(--desktop-icon-size);
        }
        .desktop-icon:hover { background: rgba(255,255,255,.1); }
        .desktop-icon .icon-wrap {
            width: 58px; height: 58px; border-radius: 14px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,.15);
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
        }
        .desktop-icon .icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .desktop-icon .icon-wrap .i-font {
            font-size: 24px; font-weight: 600; color: #fff;
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center;
        }
        .desktop-icon .icon-label {
            margin-top: 6px; font-size: 11px; color: #fff;
            text-align: center; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; max-width: 72px;
            text-shadow: 0 1px 4px rgba(0,0,0,.5);
        }
        .desktop-icon.folder-item .icon-wrap {
            background: rgba(255,255,255,.08);
            display: grid; grid-template-columns: 1fr 1fr; padding: 4px; gap: 2px;
        }
        .desktop-icon.folder-item .icon-wrap .mini-icon {
            border-radius: 4px; background: rgba(255,255,255,.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: rgba(255,255,255,.7);
        }

        /* ===== Window (Finder-style) ===== */
        .mac-window {
            position: fixed; z-index: 100;
            background: rgba(245,245,247,.85);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 12px; box-shadow: 0 24px 48px rgba(0,0,0,.3), 0 0 0 1px rgba(0,0,0,.1);
            min-width: 500px; min-height: 300px;
            opacity: 0; transform: scale(.95); transition: opacity .2s, transform .2s;
            display: flex; flex-direction: column;
            resize: both; overflow: hidden;
        }
        body.light-mode .mac-window { background: rgba(245,245,247,.9); }
        .mac-window.show { opacity: 1; transform: scale(1); }
        .mac-window .win-titlebar {
            display: flex; align-items: center; padding: 10px 16px; cursor: default;
            flex-shrink: 0;
        }
        .mac-window .win-titlebar .traffic-lights { display: flex; gap: 8px; margin-right: 16px; }
        .mac-window .win-titlebar .traffic-lights .dot {
            width: 12px; height: 12px; border-radius: 50%; cursor: pointer;
            transition: all .2s;
        }
        .mac-window .win-titlebar .traffic-lights .dot.close { background: #ff5f57; }
        .mac-window .win-titlebar .traffic-lights .dot.minimize { background: #febc2e; }
        .mac-window .win-titlebar .traffic-lights .dot.maximize { background: #28c840; }
        .mac-window .win-titlebar .traffic-lights .dot:hover { filter: brightness(1.2); }
        .mac-window .win-titlebar .win-title { font-size: 12px; color: #666; flex: 1; text-align: center; }
        .mac-window .win-content {
            flex: 1; padding: 12px; overflow-y: auto; min-height: 0;
        }
        .mac-window .win-content .d-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 56px);
            gap: 12px; justify-content: center; padding: 10px;
        }
        .mac-window .win-content .d-grid .win-icon-item {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            padding: 6px; border-radius: 6px; transition: background .2s;
        }
        .mac-window .win-content .d-grid .win-icon-item:hover { background: rgba(0,0,0,.05); }
        .mac-window .win-content .d-grid .win-icon-item .wi-wrap {
            width: 44px; height: 44px; border-radius: 10px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,.5);
        }
        .mac-window .win-content .d-grid .win-icon-item .wi-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .mac-window .win-content .d-grid .win-icon-item .wi-wrap .wi-font {
            font-size: 18px; font-weight: 600; color: #fff;
        }
        .mac-window .win-content .d-grid .win-icon-item .wi-label {
            font-size: 10px; color: #444; margin-top: 4px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 56px;
        }

        /* ===== Dock ===== */
        .dock {
            position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); z-index: 200;
            display: flex; align-items: flex-end; gap: 4px;
            padding: 6px 12px; border-radius: 20px;
            background: var(--dock-bg); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.1);
        }
        .dock .dock-item {
            width: 48px; cursor: pointer; transition: all .15s;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }
        .dock .dock-item:hover { transform: translateY(-4px) scale(1.05); }
        .dock .dock-item .dock-icon {
            width: 44px; height: 44px; border-radius: 10px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,.15);
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }
        .dock .dock-item .dock-icon img { width: 100%; height: 100%; object-fit: cover; }
        .dock .dock-item .dock-icon .d-font {
            font-size: 18px; font-weight: 600; color: #fff;
        }
        .dock .dock-item .dock-label {
            position: absolute; bottom: calc(100% + 6px);
            font-size: 10px; color: #fff; background: rgba(0,0,0,.6);
            padding: 2px 8px; border-radius: 4px; white-space: nowrap;
            opacity: 0; transition: opacity .2s; pointer-events: none;
        }
        .dock .dock-item:hover .dock-label { opacity: 1; }
        .dock .dock-sep { width: 1px; height: 36px; background: rgba(255,255,255,.15); margin: 0 4px; }

        /* ===== Right-click Context Menu ===== */
        .ctx-menu {
            position: fixed; z-index: 9999; min-width: 160px;
            background: rgba(255,255,255,.6); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 8px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.2);
            opacity: 0; transform: scale(.92); transition: opacity .15s, transform .15s;
            pointer-events: none;
        }
        .ctx-menu.show { opacity: 1; transform: scale(1); pointer-events: auto; }
        .ctx-menu .ctx-item {
            padding: 6px 12px; font-size: 12px; cursor: pointer;
            border-radius: 4px; color: #333;
        }
        .ctx-menu .ctx-item:hover { background: var(--accent); color: #fff; }
        .ctx-menu .ctx-sep { height: 1px; background: rgba(0,0,0,.1); margin: 4px 8px; }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,.3);
            display: none; align-items: flex-end; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal-sheet {
            background: rgba(255,255,255,.85); backdrop-filter: blur(40px);
            border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
            max-height: 80vh; padding: 20px; overflow-y: auto;
            transform: translateY(100%); transition: transform .3s;
        }
        .modal-overlay.show .modal-sheet { transform: translateY(0); }
        .modal-sheet .modal-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 16px; color: #222; }
        .modal-sheet .form-group { margin-bottom: 12px; }
        .modal-sheet .form-group label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        .modal-sheet input, .modal-sheet textarea, .modal-sheet select {
            width: 100%; padding: 8px 12px; border: 1px solid rgba(0,0,0,.1);
            border-radius: 8px; font-size: 13px; outline: none; background: rgba(255,255,255,.5);
        }
        .modal-sheet input:focus { border-color: var(--accent); }
        .modal-sheet .btn-row { display: flex; gap: 8px; margin-top: 16px; }
        .modal-sheet .btn-row button {
            flex: 1; padding: 8px; border-radius: 8px; border: none;
            font-size: 13px; cursor: pointer; transition: all .2s;
        }
        .modal-sheet .btn-row .btn-primary { background: var(--accent); color: #fff; }
        .modal-sheet .btn-row .btn-primary:hover { filter: brightness(1.1); }
        .modal-sheet .btn-row .btn-cancel { background: rgba(0,0,0,.05); color: #666; }
        .modal-sheet .btn-row .btn-cancel:hover { background: rgba(0,0,0,.1); }
        .modal-sheet .icon-type-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
        .modal-sheet .icon-type-group .type-btn {
            padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,.1);
            font-size: 12px; cursor: pointer; background: rgba(255,255,255,.3);
            transition: all .2s;
        }
        .modal-sheet .icon-type-group .type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ===== Search tips ===== */
        .search-tips {
            position: fixed; top: var(--menu-height); right: 16px; z-index: 999;
            background: rgba(255,255,255,.7); backdrop-filter: blur(20px);
            border-radius: 8px; padding: 6px; min-width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,.15);
            display: none;
        }
        .search-tips.show { display: block; }
        .search-tips .st-item { padding: 6px 10px; font-size: 12px; cursor: pointer; border-radius: 4px; color: #333; }
        .search-tips .st-item:hover { background: var(--accent); color: #fff; }

        /* ===== Drag overlay for Sortable ===== */
        .sortable-ghost { opacity: .3; }
        .sortable-drag { opacity: .8; }

        @media (max-width: 767px) {
            .top-menu .menu-left .menu-item { display: none; }
            .top-menu .menu-right .search-box { display: none; }
            .mac-window { min-width: 90vw !important; left: 5vw !important; }
            .desktop-grid { grid-template-columns: repeat(auto-fill, 64px); gap: 12px; }
        }
    </style>
</head>
<body class="dark-mode">
    <!-- Wallpaper -->
    <div class="wallpaper-layer">
        <img src="" class="wallpaper-img" alt="">
        <div class="blur-overlay"></div>
    </div>

    <!-- Top Menu Bar (macOS style) -->
    <div class="top-menu">
        <div class="menu-left">
            <span class="app-name" id="appMenuBtn">📑 书签</span>
            <span class="menu-item" id="menuNewFolder">新建文件夹</span>
            <span class="menu-item" id="menuNewBookmark">新建书签</span>
        </div>
        <div class="menu-center" id="folderChips">
            <!-- chips rendered by JS -->
        </div>
        <div class="menu-right">
            <div class="search-box">
                <i class="iconfont icon-search" style="font-size:12px;opacity:.6;"></i>
                <input type="text" id="menuSearch" placeholder="搜索书签...">
            </div>
            <button class="menu-icon-btn" id="themeBtn" title="切换主题"><i class="iconfont icon-moon"></i></button>
            <button class="menu-icon-btn" id="importBtn" title="导入"><i class="iconfont icon-download"></i></button>
            <button class="menu-icon-btn" id="exportBtn" title="导出"><i class="iconfont icon-upload"></i></button>
            <span class="clock-display" id="clockDisplay">00:00</span>
        </div>
    </div>

    <!-- Desktop Icons -->
    <div class="desktop-area" id="desktopArea">
        <div class="desktop-grid" id="desktopGrid"></div>
    </div>

    <!-- Search Tips -->
    <div class="search-tips" id="searchTips"><ul style="list-style:none;padding:0;margin:0;"></ul></div>

    <!-- Dock -->
    <div class="dock" id="dock"></div>

    <!-- Context Menu -->
    <div class="ctx-menu" id="ctxMenu"></div>

    <!-- Modal Sheet -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet" id="modalSheet">
            <div class="modal-title" id="modalTitle">添加书签</div>
            <div class="icon-type-group" id="iconTypeGroup">
                <span class="type-btn active" data-type="url">在线图标</span>
                <span class="type-btn" data-type="color">纯色图标</span>
                <span class="type-btn" data-type="text">链接图标</span>
            </div>
            <div class="form-group">
                <label>链接地址</label>
                <textarea id="mUrl" rows="2" placeholder="https://..."></textarea>
            </div>
            <div class="form-group">
                <label>链接名称</label>
                <input type="text" id="mName" placeholder="名称">
            </div>
            <div class="form-group" id="colorGroup" style="display:none;">
                <label>图标颜色</label>
                <input type="color" id="mColor" value="#007AFF" style="height:40px;padding:4px;">
                <input type="text" id="mIconText" placeholder="图标文字(1-2字符)" style="margin-top:6px;">
            </div>
            <div class="form-group" id="textGroup" style="display:none;">
                <label>图标图片链接</label>
                <input type="text" id="mLinkIcon" placeholder="https://.../icon.png">
            </div>
            <input type="hidden" id="mEditId" value="">
            <div class="btn-row">
                <button class="btn-cancel" id="modalCancel">取消</button>
                <button class="btn-primary" id="modalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- Window (Finder) -->
    <div class="mac-window" id="macWindow">
        <div class="win-titlebar">
            <div class="traffic-lights">
                <span class="dot close" id="winClose"></span>
                <span class="dot minimize" id="winMinimize"></span>
                <span class="dot maximize" id="winMaximize"></span>
            </div>
            <span class="win-title" id="winTitle">文件夹</span>
        </div>
        <div class="win-content" id="winContent"></div>
    </div>

    <!-- JS -->
    <script src="https://nav.iowen.cn/wp-content/plugins/iotab/assets/js/jquery.min.js"></script>
    <script src="https://nav.iowen.cn/wp-content/plugins/iotab/assets/js/Sortable.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
